{% load static %}<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}数据收集协作平台{% endblock %}</title>
  <link rel="icon" href="{% static 'img/ezra-favicon.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: "Noto Sans SC", system-ui, -apple-system, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #eef1f6 0%, #e6eaf2 100%); color: #1f2430; padding: 24px;
    }
    .card {
      width: 100%; max-width: 1060px; display: grid; grid-template-columns: 1.05fr 1fr;
      background: #fff; border-radius: 24px; overflow: hidden;
      box-shadow: 0 30px 80px -20px rgba(30, 40, 80, .35);
    }

    /* ===== 左侧品牌面板 ===== */
    .brand {
      position: relative; padding: 48px 44px; color: #eaeefc;
      background:
        radial-gradient(130% 130% at 100% 100%, #2a4170 0%, transparent 55%),
        linear-gradient(160deg, #213a63 0%, #1c2b4a 58%, #15233e 100%);
      display: flex; flex-direction: column;
    }
    .brand .logo { display: flex; align-items: center; gap: 12px; }
    .brand .logo img { width: 38px; height: 38px; }
    .brand .logo span { font-family: "Sora", system-ui, sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: .2px; }
    .brand .logo .z { color: #e89a2c; font-style: normal; }
    .brand .body { margin-top: auto; }
    .eyebrow { font-size: .72rem; letter-spacing: 3px; color: #9db4ff; font-weight: 700; }
    .brand h1 { font-family: "Sora", sans-serif; font-size: 2.5rem; line-height: 1.15; margin: 10px 0 14px; font-weight: 800; }
    .brand h1 .hl { color: #f0a94a; }
    .brand p.desc { color: #b7bed8; font-size: .95rem; line-height: 1.7; max-width: 30ch; margin: 0; }
    .art { display: block; width: 100%; max-width: 330px; height: auto; margin: 26px 0 22px; }
    .stats { display: flex; gap: 26px; }
    .stats .num { font-family: "Sora", sans-serif; font-size: 1.5rem; font-weight: 800; }
    .stats .lbl { font-size: .74rem; color: #9aa3c7; margin-top: 2px; }

    /* ===== 右侧表单 ===== */
    .panel { padding: 56px 52px; display: flex; flex-direction: column; justify-content: center; }
    .panel h2 { font-size: 1.8rem; margin: 0 0 6px; font-weight: 800; }
    .panel .sub { color: #8a90a2; font-size: .92rem; margin: 0 0 26px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 8px; color: #3a4150; }
    .input { position: relative; }
    .input svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #aab; }
    .input input {
      width: 100%; padding: 13px 14px 13px 42px; border: 1.5px solid #e3e6ee; border-radius: 12px;
      font-size: 1rem; font-family: inherit; background: #f8f9fc; transition: border-color .15s, background .15s;
    }
    .input input:focus { outline: none; border-color: #2f5fd0; background: #fff; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 22px; }
    .remember { display: flex; align-items: center; gap: 8px; font-size: .88rem; color: #5a6172; cursor: pointer; }
    .remember input { width: 16px; height: 16px; accent-color: #2f5fd0; }
    .btn {
      width: 100%; padding: 14px; border: 0; border-radius: 12px; cursor: pointer;
      font-size: 1.02rem; font-weight: 700; letter-spacing: 4px; color: #fff;
      background: linear-gradient(135deg, #2952c4 0%, #3f6fd0 100%);
      box-shadow: 0 10px 24px -8px rgba(47, 95, 208, .6); transition: transform .08s, box-shadow .15s;
    }
    .btn:hover { box-shadow: 0 14px 30px -8px rgba(47, 95, 208, .72); }
    .btn:active { transform: translateY(1px); }
    .err { background: #fde8e8; color: #c0392b; border-radius: 10px; padding: 10px 14px; font-size: .88rem; margin-bottom: 18px; }
    .ok { background: #e7f6ec; color: #1e7e4a; border-radius: 10px; padding: 10px 14px; font-size: .88rem; margin-bottom: 18px; }
    .errorlist { color: #c0392b; font-size: .82rem; list-style: none; padding: 0; margin: 6px 0 0; }
    .note { text-align: center; font-size: .85rem; color: #9aa0b0; margin: 20px 0 0; }
    .note a { color: #2f5fd0; font-weight: 600; text-decoration: none; }

    @media (max-width: 760px) {
      .card { grid-template-columns: 1fr; max-width: 440px; }
      .brand { display: none; }
      .panel { padding: 40px 30px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- 左:品牌面板 -->
    <div class="brand">
      <div class="logo">
        <img src="{% static 'img/ezra-logo.svg' %}" alt="Ezra">
        <span>E<i class="z">z</i>ra Studio</span>
      </div>
      <div class="body">
        <div class="eyebrow">BIBLE DATA PLATFORM</div>
        <h1>数据<span class="hl">收集</span>平台</h1>
        <p class="desc">为训练贴切解释圣经的 AI,在此收集、标注、审核、导出高质量数据集。多语言 · 多模型 · 专家协作。</p>
        <img class="art" src="{% static 'img/keyboard-book.svg' %}" alt="键盘与书">
        <div class="stats">
          <div><div class="num">3+</div><div class="lbl">起步语言</div></div>
          <div><div class="num">RAG</div><div class="lbl">导出就绪</div></div>
          <div><div class="num">100%</div><div class="lbl">专家定稿</div></div>
        </div>
      </div>
    </div>

    <!-- 右:表单区 -->
    {% block panel %}{% endblock %}
  </div>
</body>
</html>
