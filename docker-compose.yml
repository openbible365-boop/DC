# DC 与已有的 ko-tts 共存:不占用 80/443,由现有的 Caddy 反代到 web。
# web 同时接入 DC 内部网络与 ko-tts 的网络(供 Caddy 按容器名 dc-web 访问)。
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dc-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - dc-internal

  web:
    build: .
    restart: always
    env_file: .env
    environment:
      RUN_MIGRATIONS: "1"
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      dc-internal:
      caddy-net:
        aliases:
          - dc-web        # Caddyfile 里用 reverse_proxy dc-web:8000

  worker:
    build: .
    restart: always
    env_file: .env
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    networks:
      - dc-internal

networks:
  dc-internal:
    driver: bridge
  # 复用 ko-tts 已创建的网络(Caddy 在其中)
  caddy-net:
    external: true
    name: ko-tts_ko-tts-net

volumes:
  postgres_data:
  media_volume:
