upstream django {
    server web:8000;
}

# HTTP:仅用于 ACME 验证,其余跳转到 HTTPS
server {
    listen 80;
    server_name dc.ezra76.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name dc.ezra76.com;

    ssl_certificate     /etc/letsencrypt/live/dc.ezra76.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dc.ezra76.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 上传注释书/音视频:放宽请求体
    client_max_body_size 500M;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
